<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculator App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Calculator</h1>

        <input type="number" id="num1" placeholder="Enter first number">

        <input type="number" id="num2" placeholder="Enter second number">

        <div class="buttons">

            <button id="addBtn">
                Add
            </button>

            <button id="subtractBtn">
                Subtract
            </button>

            <button id="multiplyBtn">
                Multiply
            </button>

            <button id="divideBtn">
                Divide
            </button>

            <button id="clearBtn">
                Clear
            </button>

        </div>

        <h2>
            Result:
        </h2>

        <p id="result">
            Waiting for inputs...
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
